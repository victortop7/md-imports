<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MD Imports — Produto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #080c12; color: #fff; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    :root {
      --blue: #00a8ff;
      --blue-dark: #0050cc;
      --black: #080c12;
      --black-2: #0f1520;
      --black-3: #161d2e;
      --text-mid: #a0aec0;
      --glow: 0 0 20px rgba(0,168,255,0.3), 0 0 40px rgba(0,168,255,0.15);
      --glow-sm: 0 0 12px rgba(0,168,255,0.25);
    }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* HEADER */
    header {
      background: rgba(8,12,18,0.97); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,168,255,0.12);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; max-width: 1200px; margin: 0 auto;
    }
    .logo img { height: 52px; width: auto; }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-mid); font-size: 14px; font-weight: 600;
      border: 1px solid rgba(0,168,255,0.2); border-radius: 50px;
      padding: 8px 18px; transition: all .2s;
    }
    .back-btn:hover { color: var(--blue); border-color: var(--blue); }

    /* MAIN */
    .produto-page {
      max-width: 1100px; margin: 0 auto; padding: 48px 24px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start;
      animation: fadeUp .5s ease both;
    }

    /* IMAGEM */
    .prod-img-wrap {
      background: linear-gradient(135deg, #0f1520 0%, #1a2035 100%);
      border-radius: 20px; border: 1px solid rgba(0,168,255,0.12);
      display: flex; align-items: center; justify-content: center;
      padding: 40px; min-height: 420px; position: relative;
      box-shadow: var(--glow);
    }
    .prod-img-wrap img {
      max-height: 380px; width: auto; object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0,168,255,0.35));
      animation: float 4s ease-in-out infinite;
    }
    .prod-badge {
      position: absolute; top: 18px; left: 18px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: #fff; font-size: 11px; font-weight: 800;
      padding: 5px 14px; border-radius: 50px; letter-spacing: 1px;
    }

    /* INFO */
    .prod-info { display: flex; flex-direction: column; gap: 20px; }
    .prod-marca {
      font-size: 12px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: var(--blue);
    }
    .prod-nome {
      font-size: clamp(28px, 4vw, 42px); font-weight: 900; line-height: 1.1;
      letter-spacing: -.5px;
    }
    .prod-specs { display: flex; flex-wrap: wrap; gap: 8px; }
    .spec-tag {
      background: rgba(0,168,255,0.1); color: var(--blue);
      font-size: 12px; font-weight: 700; padding: 5px 14px;
      border-radius: 50px; border: 1px solid rgba(0,168,255,0.25);
    }
    .prod-desc {
      font-size: 15px; color: var(--text-mid); line-height: 1.75;
      border-left: 3px solid rgba(0,168,255,0.3); padding-left: 16px;
    }

    /* FICHA */
    .ficha { background: var(--black-3); border-radius: 14px; overflow: hidden; border: 1px solid rgba(0,168,255,0.1); }
    .ficha-title { padding: 14px 20px; font-size: 12px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--blue); border-bottom: 1px solid rgba(0,168,255,0.1); }
    .ficha-row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ficha-row:last-child { border-bottom: none; }
    .ficha-key { padding: 12px 20px; font-size: 13px; font-weight: 700; color: var(--text-mid); min-width: 140px; }
    .ficha-val { padding: 12px 20px; font-size: 13px; color: #fff; }

    /* PRECO + CTA */
    .prod-comprar { display: flex; flex-direction: column; gap: 16px; }
    .prod-preco-label { font-size: 12px; color: var(--text-mid); font-weight: 600; }
    .prod-preco-val {
      font-size: 40px; font-weight: 900; color: #fff;
      line-height: 1;
    }
    .prod-preco-val span { font-size: 16px; color: var(--text-mid); font-weight: 500; }
    .prod-parcela { font-size: 13px; color: var(--text-mid); margin-top: -8px; }

    .btn-wpp {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #25d366; color: #fff; font-size: 16px; font-weight: 800;
      padding: 18px 36px; border-radius: 50px; border: none; cursor: pointer;
      box-shadow: 0 4px 24px rgba(37,211,102,0.35);
      transition: transform .2s, box-shadow .2s; width: 100%;
    }
    .btn-wpp:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(37,211,102,0.5); }
    .btn-wpp img { width: 28px; height: 28px; object-fit: contain; }

    .btn-back-mob {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: var(--text-mid); font-size: 14px; font-weight: 600;
      padding: 14px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; width: 100%; transition: all .2s;
    }
    .btn-back-mob:hover { border-color: var(--blue); color: var(--blue); }

    /* WHATSAPP FLUTUANTE */
    .whatsapp-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 200;
      width: 72px; height: 72px; border-radius: 50%;
      background: #25d366; box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      display: flex; align-items: center; justify-content: center;
      animation: float 3s ease-in-out infinite;
      transition: transform .2s, box-shadow .2s;
    }
    .whatsapp-btn:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(37,211,102,0.5); }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 100px 24px; }
    .not-found h2 { font-size: 32px; margin-bottom: 16px; }
    .not-found p { color: var(--text-mid); margin-bottom: 32px; }

    /* STICKY MOBILE CTA */
    .sticky-cta {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      background: rgba(8,12,18,0.97); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,168,255,0.15);
      padding: 12px 16px;
      align-items: center; gap: 12px;
    }
    .sticky-preco { flex: 1; }
    .sticky-preco-val { font-size: 20px; font-weight: 900; }
    .sticky-preco-label { font-size: 11px; color: var(--text-mid); }
    .sticky-btn {
      display: flex; align-items: center; gap: 8px;
      background: #25d366; color: #fff; font-size: 14px; font-weight: 800;
      padding: 14px 20px; border-radius: 50px; border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(37,211,102,0.35); white-space: nowrap;
    }
    .sticky-btn img { width: 22px; height: 22px; object-fit: contain; }

    /* MOBILE */
    @media (max-width: 768px) {
      .produto-page { grid-template-columns: 1fr; gap: 24px; padding: 20px 16px 100px; }
      .prod-img-wrap { min-height: 260px; padding: 20px; }
      .prod-img-wrap img { max-height: 220px; }
      .prod-nome { font-size: 26px; }
      .prod-comprar { display: none; }
      .sticky-cta { display: flex; }
      .whatsapp-btn { display: none; }
      .ficha-key { min-width: 110px; font-size: 12px; }
      .ficha-val { font-size: 12px; }
    }
  </style>
</head>

function render() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const p = PRODUTOS[id];
  const app = document.getElementById('app');

  if (!p) {
    app.innerHTML = `
      <div class="not-found">
        <h2>Produto não encontrado</h2>
        <p>Esse produto não existe ou foi removido.</p>
        <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;font-weight:700;padding:14px 32px;border-radius:50px;">← Voltar ao catálogo</a>
      </div>`;
    return;
  }

  document.title = `${p.nome} — MD Imports`;

  const fichaRows = p.ficha.map(([k,v]) => `
    <div class="ficha-row">
      <div class="ficha-key">${k}</div>
      <div class="ficha-val">${v}</div>
    </div>`).join('');

  const msg = `Olá! Tenho interesse no ${p.nome} (${p.preco}). Pode me passar mais informações?`;
  const wppLink = `https://wa.me/55850000000?text=${encodeURIComponent(msg)}`;

  app.innerHTML = `
    <div class="produto-page">
      <div class="prod-img-wrap">
        ${p.novo ? '<span class="prod-badge">NOVO</span>' : ''}
        <img src="${p.img}" alt="${p.nome}"/>
      </div>
      <div class="prod-info">
        <div class="prod-marca">${p.marca}</div>
        <div class="prod-nome">${p.nome}</div>
        <div class="prod-specs">
          ${p.specs.map(s => `<span class="spec-tag">${s}</span>`).join('')}
        </div>
        <p class="prod-desc">${p.desc}</p>
        <div class="ficha">
          <div class="ficha-title">Ficha Técnica</div>
          ${fichaRows}
        </div>
        <div class="prod-comprar">
          <div>
            <div class="prod-preco-label">Preço</div>
            <div class="prod-preco-val">${p.preco} <span>/12x sem juros</span></div>
            <div class="prod-parcela">${p.parcelas}</div>
          </div>
          <a href="${wppLink}" target="_blank" class="btn-wpp">
            <img src="logo%20rede%20sociais/logo%20whatsapp.png" alt="WhatsApp"/>
            Comprar pelo WhatsApp
          </a>
          <a href="index.html" class="btn-back-mob">← Voltar ao catálogo</a>
        </div>
      </div>
    </div>`;
}

render();

// Preenche sticky CTA mobile
(function() {
  const params = new URLSearchParams(window.location.search);
  const p = PRODUTOS[params.get('id')];
  if (!p) return;
  const msg = `Olá! Tenho interesse no ${p.nome} (${p.preco}). Pode me passar mais informações?`;
  const link = `https://wa.me/55850000000?text=${encodeURIComponent(msg)}`;
  document.getElementById('stickyPreco').textContent = p.preco;
  document.getElementById('stickyBtn').href = link;
})();
</script>
